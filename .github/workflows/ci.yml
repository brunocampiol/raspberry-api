name: .NET Build, Test & Analyze

on:
  push:
    branches: [ "feature/actions" ]
  pull_request:
    branches: [ "feature/actions" ]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ------------------------------------------------------------
      # 1. FORMAT CHECK (Informational only – does not fail the build)
      # ------------------------------------------------------------
      - name: Check Code Formatting (dotnet format)
        continue-on-error: true
        run: dotnet format --verify-no-changes --verbosity diagnostic

      # ------------------------------------------------------------
      # 2. VULNERABILITY SCAN (Informational only – does not fail the build)
      # ------------------------------------------------------------
      - name: Scan for vulnerable NuGet packages
        continue-on-error: true
        run: dotnet list package --vulnerable --include-transitive

      # ------------------------------------------------------------
      # 3. BUILD & TEST (These *should* fail if there's a real problem)
      # ------------------------------------------------------------
      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      # ------------------------------------------------------------
      # 4. CODEQL (Security scanning – does not fail the build)
      # ------------------------------------------------------------
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          queries: security-and-quality

      - name: Autobuild for CodeQL
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
        continue-on-error: true   # Prevents workflow failure even if upload fails