name: .NET Build, Test & Analyze

on:
  push:
    branches: [ "feature/actions" ]
  pull_request:
    branches: [ "feature/actions" ]

# Add permissions required for GitHub's built-in security scanners
permissions:
  actions: read
  contents: read
  security-events: write  # Required for uploading CodeQL SARIF results

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clone is not enough for SonarCloud

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ------------------------------------------------------------
      # 1. FORMAT CHECK (Enforce Code Style)
      # ------------------------------------------------------------
      - name: Check Code Formatting (dotnet format)
        run: dotnet format --verify-no-changes --verbosity diagnostic

      # ------------------------------------------------------------
      # 2. VULNERABILITY SCAN (NuGet Packages)
      # ------------------------------------------------------------
      - name: Scan for vulnerable NuGet packages
        run: dotnet list package --vulnerable --include-transitive

      # ------------------------------------------------------------
      # 3. BUILD (Required for SonarScanner)
      # ------------------------------------------------------------
      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults

      # ------------------------------------------------------------
      # 4. SONARCLOUD (Deep Code Smells & Security Hotspots)
      # ------------------------------------------------------------
      # Requires a free account at sonarcloud.io and a project key.
      - name: Install SonarScanner for .NET
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"YOUR_ORGANIZATION_YOUR_PROJECT_KEY" \
            /o:"YOUR_ORGANIZATION" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/*/coverage.opencover.xml"

      - name: Rebuild for SonarCloud (Full Analysis)
        run: dotnet build --no-incremental

      - name: End SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      # ------------------------------------------------------------
      # 5. GITHUB CODEQL (Security Vulnerabilities)
      # ------------------------------------------------------------
      # This is GitHub's native SAST tool. Free for public repos.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          # Optional: Add queries for extra security
          queries: security-and-quality

      - name: Autobuild for CodeQL
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"